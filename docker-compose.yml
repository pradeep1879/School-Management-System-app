version: "3.9"

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: school_backend
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"
    networks:
      - school-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: school_frontend
    restart: always
    depends_on:
      - backend
    env_file:
      - ./client/.env
    ports:
      - "5173:5173"
    networks:
      - school-network

networks:
  school-network:
    driver: bridge